services:
  mariadb:
    build: requirements/mariadb
    image: mariadb
    restart: unless-stopped
    env_file: .env
    volumes:
      - wp-db:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build: requirements/wordpress
    image: wordpress
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mariadb
    volumes:
      - wp-files:/var/www/html
    networks:
      - inception

  nginx:
    build: requirements/nginx
    image: nginx
    restart: unless-stopped
    env_file: .env
    ports:
      - "443:443"
    depends_on:
      - wordpress
    volumes:
      - wp-files:/var/www/html
    networks:
      - inception

volumes:
  wp-db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/db
  wp-files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/wordpress

networks:
  inception:
    driver: bridge
