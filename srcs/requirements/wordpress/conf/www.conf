[www]
user  = www-data
group = www-data

; Listen on all interfaces on port 9000 so NGINX can reach us over the Docker network.
; Default is a unix socket — that only works within the same machine.
listen = 9000

pm                   = dynamic
pm.max_children      = 5
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Pass all container env vars to PHP workers so wp-config can use them if needed.
clear_env = no
