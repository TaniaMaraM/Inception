[www]
user  = www-data
group = www-data

; Listen on TCP port 9000 so NGINX can reach php-fpm over the Docker network.
; The default is a unix socket which only works within the same container.
listen = 9000

pm                   = dynamic
pm.max_children      = 5
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Pass all container environment variables to PHP workers.
clear_env = no
