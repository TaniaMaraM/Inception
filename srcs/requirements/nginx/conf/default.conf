server {
    listen      443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root  /var/www/html;
    index index.php index.html;

    # WordPress pretty permalinks: try the URI as a file, then a
    # directory, then fall back to index.php with the query string.
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Pass .php requests to php-fpm running in the wordpress container.
    # wordpress:9000 is resolved by Docker's internal DNS.
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass            wordpress:9000;
        fastcgi_index           index.php;
        include                 fastcgi_params;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param           PATH_INFO $fastcgi_path_info;
    }

    # Block access to .htaccess and other hidden files.
    location ~ /\. {
        deny all;
    }
}
