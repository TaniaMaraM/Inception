server {
    listen      443 ssl;
    server_name tmarcos.42.fr;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    # Only TLS 1.2 and 1.3 — older versions are disabled by omission.
    ssl_protocols       TLSv1.2 TLSv1.3;

    root  /var/www/html;
    index index.php index.html;

    # WordPress pretty permalinks: try file, then directory, then fall back to index.php.
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Forward PHP requests to php-fpm in the wordpress container via FastCGI.
    # 'wordpress:9000' is resolved by Docker's internal DNS.
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass            wordpress:9000;
        fastcgi_index           index.php;
        include                 fastcgi_params;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param           PATH_INFO $fastcgi_path_info;
    }

    # Block access to hidden files (.htaccess, .git, etc).
    location ~ /\. {
        deny all;
    }
}
